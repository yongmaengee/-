<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIA — Risk Instinct Alert</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Pretendard:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ─── TOKENS ─── */
:root {
  --bg:       #0c0f14;
  --surface:  #131720;
  --panel:    #1a2030;
  --border:   #252d3d;
  --border2:  #2f3a52;
  --txt:      #e8ecf4;
  --muted:    #7b8aaa;
  --accent:   #4af0b0;
  --accent2:  #3dd6f5;
  --warn:     #f5a623;
  --danger:   #f25c5c;
  --ok:       #4af0b0;
  --info:     #5b8dee;
  --mono:     'DM Mono', monospace;
  --sans:     'Pretendard', sans-serif;
  --display:  'Space Grotesk', sans-serif;
  --radius:   10px;
  --shadow:   0 4px 24px rgba(0,0,0,.45);
}

/* ─── RESET ─── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  background: var(--bg);
  color: var(--txt);
  font-family: var(--sans);
  min-height: 100vh;
  overflow-x: hidden;
}
button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
input, select { font: inherit; }

/* ─── LAYOUT ─── */
.layout {
  display: grid;
  grid-template-columns: 220px 1fr;
  grid-template-rows: 56px 1fr;
  height: 100vh;
}

/* ─── TOPBAR ─── */
.topbar {
  grid-column: 1/-1;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
}
.topbar-logo {
  font-family: var(--display);
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--accent);
}
.topbar-logo span { color: var(--txt); opacity: .6; font-weight: 400; font-size: .85rem; margin-left: 8px; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
.live-badge {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--mono); font-size: .75rem; color: var(--accent);
}
.live-badge::before {
  content: '';
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent);
  animation: pulse 1.8s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74,240,176,.5); }
  50% { opacity: .7; box-shadow: 0 0 0 5px rgba(74,240,176,0); }
}
.topbar-time { font-family: var(--mono); font-size: .78rem; color: var(--muted); }

/* ─── SIDEBAR ─── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
  overflow-y: auto;
}
.sidebar-section-label {
  font-family: var(--mono);
  font-size: .65rem;
  color: var(--muted);
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: 10px 20px 4px;
}
.sidebar-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 20px;
  border-radius: 0;
  font-size: .875rem;
  color: var(--muted);
  transition: all .15s;
  cursor: pointer;
  border-left: 2px solid transparent;
}
.sidebar-item:hover { background: var(--panel); color: var(--txt); }
.sidebar-item.active {
  background: rgba(74,240,176,.07);
  color: var(--accent);
  border-left-color: var(--accent);
}
.sidebar-item .icon { font-size: 1rem; width: 18px; text-align: center; }
.sidebar-bottom { margin-top: auto; padding: 16px; border-top: 1px solid var(--border); }

/* ─── MAIN ─── */
.main {
  overflow-y: auto;
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* ─── PAGE HEADER ─── */
.page-header { display: flex; align-items: flex-start; justify-content: space-between; }
.page-title { font-family: var(--display); font-size: 1.5rem; font-weight: 700; letter-spacing: -.5px; }
.page-title small { display: block; font-family: var(--sans); font-size: .8rem; font-weight: 400; color: var(--muted); margin-top: 2px; }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 9px 18px; border-radius: var(--radius);
  font-size: .85rem; font-weight: 600;
  transition: all .15s;
}
.btn-primary { background: var(--accent); color: var(--bg); }
.btn-primary:hover { background: #6ff5c0; }
.btn-ghost { border: 1px solid var(--border2); color: var(--muted); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-slack { background: #4a154b; color: #fff; }
.btn-slack:hover { background: #611f64; }

/* ─── SECTION LABEL ─── */
.section-label {
  font-family: var(--mono);
  font-size: .7rem;
  color: var(--muted);
  letter-spacing: .12em;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ─── PIPELINE ─── */
.pipeline-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  position: relative;
}
.pipeline-row::after {
  content: '';
  position: absolute;
  top: 50%; left: calc(12.5% + 6px); right: calc(12.5% + 6px);
  height: 1px;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent2) 100%);
  opacity: .25;
  pointer-events: none;
}
.pipeline-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  position: relative;
  transition: border-color .2s;
}
.pipeline-card:hover { border-color: var(--border2); }
.pipeline-card.highlight { border-color: rgba(74,240,176,.3); }
.pipeline-card .pcard-tag {
  font-family: var(--mono); font-size: .65rem;
  color: var(--muted); text-transform: uppercase; letter-spacing: .1em;
  margin-bottom: 8px;
}
.pipeline-card .pcard-title {
  font-family: var(--display); font-size: .95rem; font-weight: 700;
  color: var(--txt); margin-bottom: 6px;
}
.pipeline-card .pcard-desc {
  font-size: .78rem; color: var(--muted); line-height: 1.5;
}
.pipeline-card .pcard-badge {
  position: absolute; top: 12px; right: 12px;
  font-family: var(--mono); font-size: .65rem;
  padding: 2px 7px; border-radius: 20px;
}
.badge-green { background: rgba(74,240,176,.12); color: var(--accent); border: 1px solid rgba(74,240,176,.2); }
.badge-blue  { background: rgba(61,214,245,.12); color: var(--accent2); border: 1px solid rgba(61,214,245,.2); }
.badge-warn  { background: rgba(245,166,35,.12);  color: var(--warn);    border: 1px solid rgba(245,166,35,.2); }

/* ─── SCENARIO BAR ─── */
.scenario-bar {
  display: flex; gap: 10px; align-items: center;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
}
.scenario-label { font-size: .8rem; color: var(--muted); margin-right: 4px; white-space: nowrap; }
.scenario-btn {
  padding: 7px 18px; border-radius: 7px;
  font-size: .85rem; font-weight: 600;
  border: 1px solid var(--border2);
  color: var(--muted);
  transition: all .15s;
}
.scenario-btn:hover { border-color: var(--accent2); color: var(--accent2); }
.scenario-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.run-btn-wrap { margin-left: auto; display: flex; gap: 8px; }

/* ─── INFERENCE GRID ─── */
.inference-grid {
  display: grid;
  grid-template-columns: 1fr 1.4fr 1fr;
  gap: 16px;
}

/* FEATURE VECTOR */
.feat-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
}
.feat-card h3 {
  font-family: var(--mono); font-size: .7rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: .1em; margin-bottom: 14px;
}
.feat-row { display: flex; flex-direction: column; gap: 10px; }
.feat-item { display: flex; flex-direction: column; gap: 4px; }
.feat-name { font-size: .78rem; color: var(--muted); display: flex; justify-content: space-between; }
.feat-name span { font-family: var(--mono); font-size: .72rem; }
.feat-bar-bg {
  height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
}
.feat-bar {
  height: 100%; border-radius: 3px;
  transition: width .6s cubic-bezier(.4,0,.2,1);
}

/* WEIGHT MATRIX */
.matrix-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
}
.matrix-card h3 {
  font-family: var(--mono); font-size: .7rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: .1em; margin-bottom: 14px;
}
.matrix-wrap { overflow-x: auto; }
.matrix-table { width: 100%; border-collapse: separate; border-spacing: 3px; }
.matrix-table th {
  font-family: var(--mono); font-size: .65rem; color: var(--muted);
  text-align: center; padding: 4px; font-weight: 400;
}
.matrix-table td {
  width: 46px; height: 38px;
  border-radius: 5px;
  text-align: center;
  font-family: var(--mono); font-size: .68rem;
  transition: all .4s;
  cursor: default;
  position: relative;
}
.matrix-table td:hover { transform: scale(1.12); z-index: 2; }
.matrix-note {
  font-size: .7rem; color: var(--muted); text-align: center; margin-top: 8px;
}
.th-row { writing-mode: horizontal-tb; }
.th-feat { text-align: right; padding-right: 6px !important; }

/* ISSUE ACTIVATION */
.issue-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  display: flex; flex-direction: column; gap: 10px;
}
.issue-card h3 {
  font-family: var(--mono); font-size: .7rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px;
}
.issue-row { display: flex; flex-direction: column; gap: 4px; }
.issue-label { display: flex; justify-content: space-between; align-items: center; }
.issue-name { font-size: .82rem; color: var(--txt); }
.issue-score {
  font-family: var(--mono); font-size: .88rem; font-weight: 600;
}
.issue-score.high { color: var(--danger); }
.issue-score.mid  { color: var(--warn); }
.issue-score.low  { color: var(--info); }
.issue-bar-bg { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.issue-bar { height: 100%; border-radius: 3px; transition: width .7s cubic-bezier(.4,0,.2,1); }

/* OUTPUT CHECKLIST */
.checklist-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
}
.checklist-card h3 {
  font-family: var(--mono); font-size: .7rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: .1em; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.checklist-items { display: flex; flex-direction: column; gap: 6px; }
.check-item {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  transition: border-color .15s;
  animation: fadeIn .4s ease both;
}
.check-item:hover { border-color: var(--border2); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.check-badge {
  font-size: .68rem; font-weight: 700; padding: 2px 8px; border-radius: 4px;
  white-space: nowrap; margin-top: 1px;
}
.check-badge.danger { background: rgba(242,92,92,.15); color: var(--danger); border: 1px solid rgba(242,92,92,.25); }
.check-badge.warn   { background: rgba(245,166,35,.12); color: var(--warn); border: 1px solid rgba(245,166,35,.2); }
.check-text { font-size: .82rem; color: var(--txt); line-height: 1.45; }

/* ─── SLACK PANEL ─── */
.slack-panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  display: flex; flex-direction: column; gap: 14px;
}
.slack-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.slack-header-left { display: flex; align-items: center; gap: 10px; }
.slack-icon {
  width: 32px; height: 32px; border-radius: 7px;
  background: #4a154b;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
}
.slack-title { font-weight: 700; font-size: .9rem; }
.slack-subtitle { font-size: .75rem; color: var(--muted); }
.slack-config {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.slack-field label { font-size: .72rem; color: var(--muted); display: block; margin-bottom: 4px; }
.slack-field input, .slack-field select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 7px 10px;
  color: var(--txt);
  font-size: .82rem;
  outline: none;
  transition: border-color .15s;
}
.slack-field input:focus, .slack-field select:focus { border-color: var(--accent); }
.slack-field input[type="password"] { font-family: var(--mono); letter-spacing: .1em; }
.slack-field.full { grid-column: 1/-1; }
.slack-preview {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
  font-family: var(--mono); font-size: .75rem; color: var(--muted);
  line-height: 1.6;
}
.slack-preview strong { color: var(--accent); }
.slack-footer { display: flex; gap: 10px; align-items: center; }
.slack-status { font-size: .75rem; margin-left: auto; }
.slack-status.ok { color: var(--ok); }
.slack-status.err { color: var(--danger); }
.slack-status.sending { color: var(--warn); }

/* ─── C-RPI METER ─── */
.crpi-grid {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 16px;
}
.crpi-meter-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  display: flex; flex-direction: column; align-items: center; gap: 10px;
}
.crpi-arc-wrap { position: relative; width: 140px; height: 80px; }
.crpi-arc-svg { width: 140px; height: 80px; }
.crpi-arc-track { fill: none; stroke: var(--border2); stroke-width: 10; stroke-linecap: round; }
.crpi-arc-fill  { fill: none; stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset .8s cubic-bezier(.4,0,.2,1), stroke .4s; }
.crpi-val {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  font-family: var(--display); font-size: 1.8rem; font-weight: 700;
  transition: color .4s;
  text-align: center; line-height: 1;
}
.crpi-grade {
  font-family: var(--mono); font-size: .75rem; font-weight: 600;
  padding: 4px 14px; border-radius: 20px;
  transition: all .4s;
}
.crpi-detail { width: 100%; }
.crpi-detail-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 0;
  border-bottom: 1px solid var(--border);
  font-size: .75rem;
}
.crpi-detail-row:last-child { border-bottom: none; }
.crpi-feat-name { color: var(--muted); }
.crpi-feat-val { font-family: var(--mono); }

/* ─── TABS ─── */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.tab-btn {
  padding: 8px 18px; font-size: .85rem; color: var(--muted);
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all .15s;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-btn:hover { color: var(--txt); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ─── TOAST ─── */
.toast-wrap {
  position: fixed; bottom: 24px; right: 24px;
  display: flex; flex-direction: column; gap: 8px;
  z-index: 9999;
}
.toast {
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 12px 18px;
  font-size: .82rem;
  box-shadow: var(--shadow);
  display: flex; align-items: center; gap: 10px;
  animation: slideIn .25s ease;
  min-width: 260px;
}
@keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: none; } }
.toast.success { border-color: rgba(74,240,176,.3); }
.toast.error   { border-color: rgba(242,92,92,.3); }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ─── LOADING OVERLAY ─── */
.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(74,240,176,.2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="layout">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-logo">RIA <span>Risk Instinct Alert · v0.1</span></div>
    <div class="topbar-right">
      <div class="live-badge">LIVE</div>
      <div class="topbar-time" id="clock">--:--:--</div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-section-label">분석</div>
    <div class="sidebar-item active" onclick="setPage('inference')">
      <span class="icon">🧠</span> 실시간 추론
    </div>
    <div class="sidebar-item" onclick="setPage('pipeline')">
      <span class="icon">🔗</span> 파이프라인
    </div>
    <div class="sidebar-section-label">설정</div>
    <div class="sidebar-item" onclick="setPage('slack')">
      <span class="icon">💬</span> Slack 알림
    </div>
    <div class="sidebar-item" onclick="setPage('model')">
      <span class="icon">⚙️</span> 모델 설정
    </div>
    <div class="sidebar-bottom">
      <div style="font-size:.72rem; color:var(--muted); line-height:1.6">
        국토안전관리원<br>건설안전사고 예보 시스템<br>
        <span style="color:var(--accent)">40,714</span> records · 54 features
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main" id="main-content">
  </main>

</div>

<!-- TOAST CONTAINER -->
<div class="toast-wrap" id="toastWrap"></div>

<script>
/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
const STATE = {

      weights: [

    },
    '장기가뭄·폭염': {

function renderCRPI(sc) {
  const score = sc.crpi;
  const pct = score / 100;
  const r = 60;
  const circ = Math.PI * r;
  const offset = circ * (1 - pct);
  let color, grade, gradeColor, gradeBg;
  if (score <= 25) { color='#4af0b0'; grade='관심'; gradeColor='#4af0b0'; gradeBg='rgba(74,240,176,.1)'; }
  else if (score <= 50) { color='#f5e642'; grade='주의'; gradeColor='#f5e642'; gradeBg='rgba(245,230,66,.1)'; }
  else if (score <= 75) { color='#f5a623'; grade='경계'; gradeColor='#f5a623'; gradeBg='rgba(245,166,35,.1)'; }
  else { color='#f25c5c'; grade='심각'; gradeColor='#f25c5c'; gradeBg='rgba(242,92,92,.1)'; }

  return `
  <div class="crpi-meter-card">
    <div style="font-family:var(--mono);font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;">C-RPI</div>
    <div class="crpi-arc-wrap">
      <svg class="crpi-arc-svg" viewBox="0 0 140 80">
        <path class="crpi-arc-track" d="M 14 74 A 56 56 0 0 1 126 74" />
        <path class="crpi-arc-fill" d="M 14 74 A 56 56 0 0 1 126 74"
          stroke="${color}"
          stroke-dasharray="${circ}"
          stroke-dashoffset="${offset}"
        />
      </svg>
      <div class="crpi-val" style="color:${color}">${score}</div>
    </div>
    <div class="crpi-grade" style="color:${gradeColor};background:${gradeBg};border:1px solid ${gradeColor}33">${grade}</div>
    <div class="crpi-detail">
      <div class="crpi-detail-row"><span class="crpi-feat-name">magnitude_score</span><span class="crpi-feat-val" style="color:${color}">${(pct*.35).toFixed(3)}</span></div>
      <div class="crpi-detail-row"><span class="crpi-feat-name">risk_heat_process</span><span class="crpi-feat-val">${(pct*.20).toFixed(3)}</span></div>
      <div class="crpi-detail-row"><span class="crpi-feat-name">risk_rain_progress</span><span class="crpi-feat-val">${(pct*.15).toFixed(3)}</span></div>
      <div class="crpi-detail-row"><span class="crpi-feat-name">risk_cold_concrete</span><span class="crpi-feat-val">${(pct*.10).toFixed(3)}</span></div>
      <div class="crpi-detail-row"><span class="crpi-feat-name">weather_scale_interact</span><span class="crpi-feat-val">${(pct*.05).toFixed(3)}</span></div>
    </div>
  </div>`;
}

function renderFeatureVector(sc) {
  const colors = { high: '#f25c5c', mid: '#f5a623', low: '#4af0b0', none: '#5b8dee' };
  return `
  <div class="feat-card">
    <h3>피쳐 이탈 벡터</h3>
    <div class="feat-row">
      ${Object.entries(sc.features).map(([name, val]) => {
        const c = val > .7 ? colors.high : val > .4 ? colors.mid : val > .15 ? colors.none : colors.low;
        return `
        <div class="feat-item">
          <div class="feat-name">${name}<span>${val.toFixed(2)}</span></div>
          <div class="feat-bar-bg">
            <div class="feat-bar" style="width:${val*100}%;background:${c}"></div>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderWeightMatrix(sc) {
  const rows = sc.weights;
  const feats = FEAT_NAMES;
  const issues = ISSUE_NAMES;
  // color: high = orange-red, low = teal
  function cellColor(v) {
    const r = Math.round(242 + (74-242)*v);
    const g = Math.round(92 + (240-92)*v);
    const b = Math.round(92 + (176-92)*v);
    return `rgb(${r},${g},${b})`;
  }
  return `
  <div class="matrix-card">
    <h3>W [FEATURE × ISSUE]</h3>
    <div class="matrix-wrap">
      <table class="matrix-table">
        <tr>
          <th></th>
          ${issues.map(i=>`<th class="th-row">${i}</th>`).join('')}
        </tr>
        ${feats.map((f,fi) => `
          <tr>
            <th class="th-feat">${f}</th>
            ${rows[fi].map(v => {
              const c = cellColor(v);
              return `<td style="background:${c}22;color:${c};border:1px solid ${c}33"
                title="${f} × ${issues[rows[fi].indexOf(v)]}: ${v.toFixed(2)}">${v.toFixed(2)}</td>`;
            }).join('')}
          </tr>
        `).join('')}
      </table>
    </div>
    <div class="matrix-note">셀 밝기 = 가중치 × 이탈량</div>
  </div>`;
}

function renderIssueActivation(sc) {
  return `
  <div class="issue-card">
    <h3>이슈 활성화</h3>
    ${Object.entries(sc.issues).map(([name, val]) => {
      const cls = val >= .65 ? 'high' : val >= .35 ? 'mid' : 'low';
      const barColor = val >= .65 ? 'var(--danger)' : val >= .35 ? 'var(--warn)' : 'var(--info)';
      return `
      <div class="issue-row">
        <div class="issue-label">
          <span class="issue-name">${name}</span>
          <span class="issue-score ${cls}">${val.toFixed(2)} ${val>=.65?'●':val>=.35?'●':''}</span>
        </div>
        <div class="issue-bar-bg">
          <div class="issue-bar" style="width:${val*100}%;background:${barColor}"></div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

        ['폭염 연속 3일 이상 + 고위험 공종', false],
        ['강수 연속 3일 이상 + 철골공사', false],
      ].map(([label, on]) => `
        <div style="display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px">
          <div style="width:36px;height:20px;border-radius:10px;background:${on?'var(--accent)':'var(--border2)'};
            position:relative;cursor:pointer;flex-shrink:0;transition:background .2s"
            onclick="this.style.background=this.dataset.on==='1'?'var(--border2)':'var(--accent)';this.dataset.on=this.dataset.on==='1'?'0':'1'"
            data-on="${on?'1':'0'}">
            <div style="width:16px;height:16px;border-radius:8px;background:#fff;position:absolute;
              top:2px;${on?'right:2px':'left:2px'};transition:left .2s,right .2s"></div>

          <span style="font-size:.8rem">${label}</span>

      `).join('')}

function bindSlack() {}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0&&tab==='bot')||(i===1&&tab==='webhook'));
  });
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${tab}`)?.classList.add('active');
}

function buildSlackMessage(sc) {
  const highIssues = Object.entries(sc.issues).filter(([,v])=>v>=STATE.slackThreshold);
  const issueStr = highIssues.map(([k,v])=>`${k}(${v.toFixed(2)})`).join(', ');
  return `<strong>${STATE.slackChannel}</strong>  #시설안전-알림<br>
🚨 <strong>[RIA 위험 감지]</strong> 시나리오: ${STATE.scenario}<br>
📊 C-RPI: <strong>${sc.crpi}점</strong> · 등급: ${sc.crpi>75?'심각':sc.crpi>50?'경계':sc.crpi>25?'주의':'관심'}<br>
⚠️ 위험 감지: ${issueStr || '없음'}<br>
🕐 ${new Date().toLocaleString('ko-KR')}`;
}

function updateSlackPreview() {
  const sc = STATE.scenarios[STATE.scenario];
  const el = document.getElementById('slackPreview');
  if (el) el.innerHTML = buildSlackMessage(sc);
}

async function sendSlackAlert(sc, isTest=false) {
  const statusEl = document.getElementById('slackStatus');
  if (statusEl) { statusEl.className='slack-status sending'; statusEl.textContent='전송 중...'; }

  const highIssues = Object.entries(sc.issues).filter(([,v])=>v>=STATE.slackThreshold);
  const issueStr = highIssues.map(([k,v])=>`${k}(${v.toFixed(2)})`).join(', ');

  // ── Slack Block Kit 메시지 구성 ──────────────────
  const payload = {
    channel: STATE.slackChannel,
    text: `🚨 [RIA 위험 감지] ${STATE.scenario} — C-RPI ${sc.crpi}점`,
    blocks: [
      {
        type: "header",
        text: { type: "plain_text", text: `🚨 RIA 위험 감지 알림 — ${STATE.scenario}`, emoji: true }
      },
      {
        type: "section",
        fields: [
          { type: "mrkdwn", text: `*C-RPI 점수*\n${sc.crpi}점` },
          { type: "mrkdwn", text: `*위험 등급*\n${sc.crpi>75?'🔴 심각':sc.crpi>50?'🟠 경계':sc.crpi>25?'🟡 주의':'🟢 관심'}` },
          { type: "mrkdwn", text: `*시나리오*\n${STATE.scenario}` },
          { type: "mrkdwn", text: `*감지 이슈*\n${issueStr||'없음'}` },
        ]
      },
      {
        type: "section",
        text: { type: "mrkdwn", text: `*현장 조치 사항*\n${sc.checks.filter(c=>c.lvl==='danger').map(c=>`• ${c.text}`).join('\n')}` }
      },
      { type: "divider" },
      {
        type: "context",
        elements: [{ type: "mrkdwn", text: `RIA System · ${new Date().toLocaleString('ko-KR')}${isTest?' · *테스트 전송*':''}` }]
      }
    ]
  };

  // ── Bot Token 방식 ──────────────────────────────
  if (STATE.slackToken) {
    try {
      const resp = await fetch('https://slack.com/api/chat.postMessage', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json; charset=utf-8',
          'Authorization': `Bearer ${STATE.slackToken}`
        },
        body: JSON.stringify(payload)
      });
      const data = await resp.json();
      if (data.ok) {
        if (statusEl) { statusEl.className='slack-status ok'; statusEl.textContent='✅ 전송 완료'; }
        showToast('💬 Slack 알림 전송 완료!', 'success');
      } else {
        throw new Error(data.error || 'Slack API error');
      }
    } catch(e) {
      if (statusEl) { statusEl.className='slack-status err'; statusEl.textContent=`❌ ${e.message}`; }
      showToast(`❌ Slack 오류: ${e.message}`, 'error');
    }
    return;
  }

  // ── Incoming Webhook 방식 ───────────────────────
  if (STATE.webhookUrl) {
    try {
      await fetch(STATE.webhookUrl, {
        method: 'POST',
        body: JSON.stringify({ text: payload.text, blocks: payload.blocks })
      });
      if (statusEl) { statusEl.className='slack-status ok'; statusEl.textContent='✅ 전송 완료'; }
      showToast('💬 Slack 알림 전송 완료!', 'success');
    } catch(e) {
      if (statusEl) { statusEl.className='slack-status err'; statusEl.textContent='❌ 전송 실패'; }
      showToast('❌ Webhook 전송 실패', 'error');
    }
    return;
  }

  // ── 토큰 미입력 ────────────────────────────────
  showToast('⚠️ Slack Token 또는 Webhook URL을 입력해주세요', 'error');
  if (statusEl) { statusEl.className='slack-status err'; statusEl.textContent='토큰 미입력'; }
}

async function testSlackConnection() {
  if (!STATE.slackToken) { showToast('⚠️ Bot Token을 먼저 입력하세요', 'error'); return; }
  try {
    const resp = await fetch('https://slack.com/api/auth.test', {
      headers: { 'Authorization': `Bearer ${STATE.slackToken}` }
    });
    const data = await resp.json();
    const statusEl = document.getElementById('slackStatus');
    if (data.ok) {
      if (statusEl) { statusEl.className='slack-status ok'; statusEl.textContent=`✅ 연결됨 · ${data.user}`; }
      showToast(`✅ Slack 연결 성공 — ${data.team} / ${data.user}`, 'success');
    } else {
      throw new Error(data.error);
    }
  } catch(e) {
    showToast(`❌ 연결 실패: ${e.message}`, 'error');
  }
}

/* ════════════════════════════════════════

════════════════════════════════════════ */
function showToast(msg, type='success') {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

  const el = document.getElementById('clock');
  if (el) el.textContent = new Date().toLocaleTimeString('ko-KR');
}
